<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="shortcut icon" href="./images/ft-favicon.png" type="image/x-icon">


    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <div class="main">



        <div class="sidebar">
            <div class="side-top">
                <div class="logo">
                    <img src="./images/ft-favicon.png" alt="">
                </div>
                <div class="side-content">
                    <h1>ExpTrack Pro</h1>
                    <p>Enterprise Finance</p>
                </div>
            </div>

            <div class="side-center">

                <h5 class="menu active"><i class="ri-dashboard-horizontal-line"></i> Dashboard</h5>
                <h5 class="menu "><i class="ri-settings-5-line"></i> Setting</h5>
            </div>

            <div class="side-footer">
                <button class="das-btn">
                    <span>Logout <i class="ri-logout-box-r-line"></i></span>
                </button>
            </div>
        </div>


        <div class="dashboard-main">

            <div class="dashboard-nav">

                <div class="dash-left">
                    <div class="dash-logo">
                        <img src="./images/ft-favicon.png" alt="">
                    </div>
                </div>

                <div class="dash-right">

                    <div class="notification">
                        <i class="ri-notification-2-line"></i>
                        <div class="count"></div>
                    </div>

                    <div class="h-line"></div>

                    <div class="user">
                        <div class="user-circle"></div>
                        <h5 id="userName"></h5>
                    </div>
                    <div class="b-menu">
                        <i class="ri-menu-line"></i>
                    </div>

                </div>


            </div>

            <div class="dashboard-content"></div>
        </div>


    </div>


    <script src="dashboard.js"></script>

</body>

</html>
